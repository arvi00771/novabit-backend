version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: novabit-postgres
    environment:
      POSTGRES_USER: novabit
      POSTGRES_PASSWORD: novabit_secret
      POSTGRES_DB: novabit_exchange
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novabit']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novabit-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: